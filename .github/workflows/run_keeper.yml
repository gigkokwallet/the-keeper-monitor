name: The Keeper 24/7 Monitor

on:
  schedule:
    - cron: '0 * * * *'  # สั่งรันอัตโนมัติทุกต้นชั่วโมง
  workflow_dispatch:      # ปุ่มกดรันเองเพื่อทดสอบ

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Monitoring
        run: python "The Sovereign Keeper.py"

      - name: Commit and Push History
        run: |
          git config --global user.name "The Keeper (Bot)"
          git config --global user.email "bot@thekeeper.com"
          git add keeper_history.csv
          git commit -m "Update strategic evaluation history" || exit 0
          git push
